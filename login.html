<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>SmartClassroom Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: radial-gradient(circle at top left, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        /* Glass Login Box */
        .login-box {
            width: 350px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.3);
            text-align: center;
            animation: fadeUp 0.8s ease;
        }

        .login-box h2 {
            color: #00f5ff;
            margin-bottom: 25px;
            text-shadow: 0 0 15px #00f5ff;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            outline: none;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 20px;
            background: #00f5ff;
            color: black;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px #00f5ff;
            transition: 0.3s;
        }

        .login-box button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px #00f5ff;
        }

        #error {
            margin-top: 15px;
            color: #ff4d4d;
            display: none;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="login-box">
        <h2>SmartClass Login</h2>

        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">

        <button type="button" onclick="login()">Login</button>

        <p id="error">❌ Invalid login</p>
    </div>



    <script>
        function login() {

            alert("Login button clicked");   // ⭐ ADD THIS

            const user = document.getElementById("username").value;
            const pass = document.getElementById("password").value;

            const savedUser = localStorage.getItem("username") || "admin";
            const savedPass = localStorage.getItem("password") || "1234";

            if (user === savedUser && pass === savedPass) {
                sessionStorage.setItem("loggedIn", "true");
                window.location.href = "dashboard.html";
            } else {
                document.getElementById("error").style.display = "block";
            }
        }
    </script>

</body>

</html>
