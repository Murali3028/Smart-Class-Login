<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>SmartClass Settings</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: radial-gradient(circle at top left, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        /* Glass Card */
        .settings-box {
            width: 420px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.3);
            animation: fadeUp 0.6s ease;
        }

        .settings-box h2 {
            color: #00f5ff;
            text-align: center;
            margin-bottom: 25px;
        }

        /* Field */
        .field {
            margin-bottom: 20px;
        }

        .field label {
            display: block;
            margin-bottom: 8px;
            color: #00f5ff;
        }

        .field input {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: none;
        }

        /* Toggle */
        .toggle {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toggle input {
            width: 18px;
            height: 18px;
        }

        /* Buttons */
        .buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 20px;
            background: #00f5ff;
            color: black;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 15px #00f5ff;
        }

        button:hover {
            box-shadow: 0 0 25px #00f5ff;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="settings-box">
        <h2>⚙️ Settings</h2>

        <div class="field">
            <label>Username</label>
            <input type="text" id="usernameInput">
        </div>

        <div class="field">
            <label>Password</label>
            <input type="password" id="passwordInput">
        </div>

        <div class="field">
            <label>Class Name</label>
            <input type="text" id="classInput" placeholder="CSE - 3rd Year">
        </div>

        <div class="field toggle">
            <input type="checkbox" id="darkToggle">
            <label for="darkToggle">Enable Dark Glow Theme</label>
        </div>

        <div class="buttons">
            <button onclick="saveSettings()">Save</button>
            <button onclick="goBack()">Back</button>
        </div>
    </div>
    <script>
        if (!sessionStorage.getItem("loggedIn")) {
            window.location.href = "login.html";
        }
    </script>
    <script>
        window.onload = () => {
            document.getElementById("usernameInput").value =
                localStorage.getItem("username") || "admin";

            document.getElementById("passwordInput").value =
                localStorage.getItem("password") || "1234";

            document.getElementById("classInput").value =
                localStorage.getItem("className") || "CSE";
        };

        function saveSettings() {

            const username = document.getElementById("usernameInput").value.trim();
            const password = document.getElementById("passwordInput").value.trim();
            const className = document.getElementById("classInput").value.trim();

            if (!username || !password) {
                alert("Username & Password cannot be empty");
                return;
            }

            localStorage.setItem("username", username);
            localStorage.setItem("password", password);
            localStorage.setItem("className", className);

            alert("✅ Settings Saved Successfully");
        }
        function goBack() {
            window.location.href = "dashboard.html";
        }
    </script>

</body>

</html>
